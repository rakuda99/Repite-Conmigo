<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repite Conmigo - Multimedia Factory v10.5 🖼️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: #1e293b; overflow-x: hidden; }
        .outfit { font-family: 'Outfit', sans-serif; }
        .premium-card { background: white; border-radius: 2.5rem; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.03); transition: all 0.4s; }
        .glass { background: rgba(255, 255, 255, 0.82); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .image-preview { width: 100px; height: 60px; object-fit: cover; border-radius: 1rem; border: 2px solid #f1f5f9; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-7xl mx-auto">
        <!-- Dashboard Header -->
        <header class="glass rounded-[3rem] p-8 mb-10 flex flex-col md:flex-row justify-between items-center gap-6 sticky top-4 z-[100] shadow-2xl">
            <div class="text-right">
                <h1 class="text-4xl font-black text-slate-900 outfit tracking-tighter decoration-blue-500 underline decoration-4">Repite <span class="text-blue-600">Multimedia</span></h1>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest mt-1">Advanced Content Refinery v10.5</p>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="openMagicModal()" class="bg-amber-100 text-amber-600 px-8 py-4 rounded-3xl font-black hover:bg-amber-200 transition-all flex items-center gap-3">
                    <span class="text-xl">🪄</span> صانع ذكي
                </button>
                <button onclick="uploadToSync()" id="mainUploadBtn" class="bg-blue-600 text-white px-10 py-5 rounded-[2.5rem] font-black shadow-2xl shadow-blue-200 hover:scale-105 transition-all">🚀 رفع ومزامنة شاملة</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-10">
            <aside class="space-y-6">
                <!-- Lesson Meta -->
                <div class="premium-card p-8 space-y-5">
                    <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-widest text-center">الإعدادات الأساسية</h3>
                    <input type="text" id="lessonTitle" oninput="saveDraft()" placeholder="عنوان الدرس" class="w-full p-5 bg-slate-50 border-none rounded-2xl font-black outline-none focus:ring-2 ring-blue-500">
                    <select id="targetLang" onchange="saveDraft()" class="w-full p-5 bg-slate-50 border-none rounded-2xl font-black outline-none">
                        <option value="es">🇪🇸 الإسبانية</option>
                        <option value="en">🇺🇸 الإنجليزية</option>
                        <option value="fr">🇫🇷 الفرنسية</option>
                    </select>
                    <button onclick="exportJSON()" class="w-full py-4 text-[10px] font-black text-slate-400 border-2 border-dashed border-slate-100 rounded-2xl hover:bg-blue-50 hover:text-blue-500 transition-all uppercase">التصدير كملف JSON</button>
                </div>

                <!-- Live Library -->
                <div class="premium-card p-6 min-h-[500px]">
                    <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-6 text-center">أرشيف السحاب 🌐</h3>
                    <div id="libraryList" class="space-y-2"></div>
                </div>
            </aside>

            <!-- Editor Pane -->
            <main class="lg:col-span-3 space-y-6">
                <div id="sentencesContainer" class="space-y-8"></div>
                <button onclick="addSentence()" class="w-full py-20 border-4 border-dashed border-slate-200 rounded-[4rem] text-slate-200 hover:border-blue-300 hover:text-blue-400 hover:bg-blue-50/50 transition-all font-black text-6xl">+</button>
            </main>
        </div>
    </div>

    <!-- Magic Assistant Modal -->
    <div id="magicModal" class="modal">
        <div class="bg-white w-full max-w-2xl rounded-[3.5rem] p-12 shadow-2xl m-4 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 p-8 text-blue-500/5 font-black text-[12rem] pointer-events-none">AI</div>
            <div class="relative">
                <h2 class="text-4xl font-black mb-2 text-slate-900 leading-tight">صانع الدروس <span class="text-blue-600">الذكي</span> 🪄</h2>
                <p class="text-slate-400 font-bold mb-8 italic">انسخ أي نص وسنتولى الترجمة، الصوت، وحتى الصور...</p>
                <textarea id="magicInput" class="w-full h-64 p-8 bg-slate-50 rounded-[2.5rem] border-none outline-none font-bold text-lg text-slate-600 focus:ring-4 ring-blue-100 placeholder:text-slate-300" placeholder="ضع النص المطول هنا..."></textarea>
                <div class="flex gap-4 mt-8">
                    <button onclick="processMagic()" class="flex-grow bg-blue-600 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl shadow-blue-200 hover:shadow-none transition-all">تفعيل الذكاء الاصطناعي 💠</button>
                    <button onclick="closeMagicModal()" class="px-10 bg-slate-100 text-slate-400 rounded-[2rem] font-bold">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notify" class="fixed bottom-10 left-10 transform translate-y-32 opacity-0 transition-all duration-500 z-[2000] pointer-events-none">
        <div class="bg-slate-900 text-white px-12 py-6 rounded-[2.5rem] shadow-2xl font-black flex items-center gap-5">
            <span id="nIcon" class="text-2xl text-blue-400">⚡</span>
            <span id="nText" class="text-lg"></span>
        </div>
    </div>

    <script>
        let counter = 0;
        function showNotify(t, i='⚡') {
            const n = document.getElementById('notify');
            document.getElementById('nText').innerText = t;
            document.getElementById('nIcon').innerText = i;
            n.classList.remove('translate-y-32', 'opacity-0');
            setTimeout(() => n.classList.add('translate-y-32', 'opacity-0'), 4000);
        }

        function openMagicModal() { document.getElementById('magicModal').style.display = 'flex'; }
        function closeMagicModal() { document.getElementById('magicModal').style.display = 'none'; }

        async function processMagic() {
            const text = document.getElementById('magicInput').value.trim();
            if(!text) return;
            closeMagicModal();
            showNotify("جاري تحليل المحتوى...", "🧠");
            const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
            document.getElementById('sentencesContainer').innerHTML = "";
            for(const s of sentences) {
                const cs = s.trim();
                if(cs.length < 2) continue;
                const rid = addSentence({ original_text: cs, translation: "...", audio_url: "", image_url: "" });
                autoMagicFill(rid);
            }
            document.getElementById('magicInput').value = "";
            saveDraft();
        }

        function addSentence(data = null) {
            counter++;
            const id = `row_${counter}`;
            const div = document.createElement('div');
            div.id = id;
            div.className = "premium-card p-10 relative group border-slate-100";
            div.innerHTML = `
                <div class="flex flex-col gap-6">
                    <div class="flex gap-4 items-center">
                        <input type="text" oninput="saveDraft()" placeholder="Original Phrase..." class="originalText flex-grow p-6 bg-slate-50 rounded-[2.5rem] outline-none font-black text-4xl text-slate-800 border-2 border-transparent focus:border-blue-400 transition-all outfit" value="${data ? data.original_text : ''}">
                        <button onclick="autoMagicFill('${id}')" class="bg-blue-600 text-white p-6 rounded-[2rem] font-black shadow-xl hover:rotate-12 transition-all">✨</button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-1 space-y-2">
                            <label class="text-[10px] font-black text-slate-300 pr-4">الصورة (URL)</label>
                            <div class="flex gap-2">
                                <input type="text" oninput="updatePreview('${id}')" placeholder="رابط الصورة..." class="imageUrl w-full p-5 bg-slate-100 rounded-2xl border-none font-bold text-xs" value="${data ? data.image_url : ''}">
                                <img src="${data?.image_url || 'https://placehold.co/400x250?text=Image'}" class="imagePreview w-16 h-12 rounded-xl object-cover shadow-sm">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-300 pr-4">الترجمة</label>
                            <input type="text" oninput="saveDraft()" placeholder="الترجمة..." class="translation w-full p-5 bg-slate-50 rounded-2xl border-none font-bold" value="${data ? data.translation : ''}">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-300 pr-4">الصوت (URL)</label>
                            <input type="text" oninput="saveDraft()" placeholder="الصوت..." class="audioUrl w-full p-5 bg-slate-50 rounded-2xl border-none text-[10px] font-mono text-blue-400" value="${data ? data.audio_url : ''}">
                        </div>
                    </div>
                </div>
                <button onclick="document.getElementById('${id}').remove(); saveDraft();" class="absolute -left-3 -top-3 w-10 h-10 bg-red-400 text-white rounded-full flex items-center justify-center font-black opacity-0 group-hover:opacity-100 transition-all shadow-xl">×</button>
            `;
            document.getElementById('sentencesContainer').appendChild(div);
            return id;
        }

        function updatePreview(id) {
            const row = document.getElementById(id);
            const url = row.querySelector('.imageUrl').value;
            row.querySelector('.imagePreview').src = url || 'https://placehold.co/400x250?text=No+Image';
            saveDraft();
        }

        async function autoMagicFill(rid) {
            const row = document.getElementById(rid);
            const text = row.querySelector('.originalText').value.trim();
            const lang = document.getElementById('targetLang').value;
            if(!text) return;
            row.style.opacity = "0.6";
            try {
                // 1. ترجمة وصوت
                const tRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${lang}|ar`);
                const tData = await tRes.json();
                row.querySelector('.translation').value = tData.responseData.translatedText;
                row.querySelector('.audioUrl').value = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${lang}&client=tw-ob`;
                
                // 2. البحث عن صورة تلقائية (Unsplash Source)
                const keywords = text.split(' ').slice(0, 2).join(' '); // أول كلمتين للبحث
                row.querySelector('.imageUrl').value = `https://source.unsplash.com/800x600/?${encodeURIComponent(keywords)},nature`;
                updatePreview(rid);
                
                showNotify("تم توليد المحتوى والوسائط! ✅", "🎨");
            } catch(e) {} finally { row.style.opacity = "1"; saveDraft(); }
        }

        function exportJSON() {
            const title = document.getElementById('lessonTitle').value || "lesson";
            const data = localStorage.getItem('repite_draft');
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${title}.json`;
            a.click();
        }

        function saveDraft() {
            const d = {
                metadata: { title: document.getElementById('lessonTitle').value, target_lang: document.getElementById('targetLang').value },
                content: Array.from(document.querySelectorAll("[id^='row_']")).map(row => ({
                    original_text: row.querySelector('.originalText').value,
                    translation: row.querySelector('.translation').value,
                    audio_url: row.querySelector('.audioUrl').value,
                    image_url: row.querySelector('.imageUrl').value,
                    validation_tags: [row.querySelector('.originalText').value.toLowerCase()]
                }))
            };
            localStorage.setItem('repite_draft', JSON.stringify(d));
        }

        function loadDraft() {
            const s = localStorage.getItem('repite_draft');
            if(s) {
                const d = JSON.parse(s);
                document.getElementById('lessonTitle').value = d.metadata.title || "";
                document.getElementById('targetLang').value = d.metadata.target_lang || "es";
                d.content.forEach(i => addSentence(i));
            } else { addSentence(); }
        }

        async function fetchLibrary() {
            const list = document.getElementById('libraryList');
            try {
                const res = await fetch('/api/library');
                const data = await res.json();
                list.innerHTML = "";
                data.reverse().forEach(item => {
                    const card = document.createElement('div');
                    card.className = "p-4 bg-white border border-slate-100 rounded-[1.5rem] cursor-pointer hover:bg-blue-600 hover:text-white transition-all shadow-sm flex justify-between items-center group";
                    card.onclick = () => restoreLesson(item.url);
                    card.innerHTML = `<p class="font-black text-xs truncate max-w-[100px]">${item.title}</p><span class="opacity-0 group-hover:opacity-100 text-xs text-white">📂</span>`;
                    list.appendChild(card);
                });
            } catch(e) {}
        }

        async function restoreLesson(url) {
            showNotify("جاري استحضار الوسائط...", "🛰️");
            try {
                const res = await fetch(`/api/fetch?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                document.getElementById('sentencesContainer').innerHTML = "";
                document.getElementById('lessonTitle').value = data.metadata.title;
                document.getElementById('targetLang').value = data.metadata.target_lang;
                data.content.forEach(i => addSentence(i));
                saveDraft();
                showNotify("تم استلام الدرس!", "✅");
            } catch(e) { alert("خطأ في الربط السحابي"); }
        }

        async function uploadToSync() {
            const btn = document.getElementById('mainUploadBtn');
            const data = JSON.parse(localStorage.getItem('repite_draft'));
            if(!data || data.content.length === 0) return alert("سجل بيانات أولاً!");
            btn.classList.add('opacity-50', 'pointer-events-none');
            showNotify("مزامنة الوسائط المتعددة...", "🌐");
            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(res.ok) { showNotify("تم حفظ الدرس في السحاب! 🚀", "✅"); fetchLibrary(); }
            } catch(e) { alert("فشل المزامنة"); }
            finally { btn.classList.remove('opacity-50', 'pointer-events-none'); }
        }

        window.onload = () => { loadDraft(); fetchLibrary(); }
    </script>
</body>
</html>
